<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="copyright" content="© 2026 Torsten Michaely – Alle Rechte vorbehalten. Mit WhatsApp-Integration für flexible Kontaktmöglichkeiten.">
    <meta name="author" content="Torsten Michaely">
    <meta name="application-name" content="KFZ Kontakt">
    <meta name="description" content="Wähle eine Kategorie für deine Nachricht an den Fahrzeughalter">
    <meta name="keywords" content="QR-Code, Fahrzeug, Kategorie, Kontakt, WhatsApp">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#667eea">
    <meta property="og:title" content="KFZ Kontakt – Kategorie wählen">
    <meta property="og:description" content="Wähle eine Kategorie für deine Nachricht">
    <meta property="og:type" content="website">
    <link rel="manifest" href="../manifest.json">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "KFZ Kontakt",
      "url": "https://kfz-kontakt.michaely.de",
      "description": "Sichere QR-Code Kommunikation zwischen Fahrzeughaltern",
      "author": {"@type": "Person", "name": "Torsten Michaely"},
      "version": "1.0.124",
      "copyrightYear": 2026,
      "copyrightHolder": {"@type": "Person", "name": "Torsten Michaely"},
      "applicationCategory": "Utilities"
    }
    </script>
    <title>Kategorie wählen</title>
    <style>
        /* © 2026 Torsten Michaely - KFZ Kontakt QR Category CSS */
        /* Premium Modern Redesign */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap');

        /* ====== DESIGN SYSTEM ====== */
        :root {
            /* Colors - Light Mode für QR-Besucher */
            --bg: #ffffff;
            --bg-secondary: #f9fafb;
            --panel: #f3f4f6;
            --panel-hover: #e5e7eb;
            --border: #d1d5db;
            --primary: #667eea;
            --primary-dark: #5568d3;
            --primary-light: #8b9eff;
            --secondary: #764ba2;
            --accent: #667eea;
            --success: #10b981;
            --success-light: #34d399;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --text: #1f2937;
            --text-secondary: #4b5563;
            --muted: #9ca3af;

            /* Typography */
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-display: 'Poppins', sans-serif;

            /* Spacing (8px grid) */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 24px;
            --spacing-2xl: 32px;
            --spacing-3xl: 48px;

            /* Shadows */
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.2);
            --shadow-xl: 0 20px 25px rgba(0, 0, 0, 0.3);
            --shadow-focus: 0 0 0 3px rgba(102, 126, 234, 0.1);

            /* Radius */
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 18px;

            /* Transitions */
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition: 300ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 500ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            color-scheme: light;
        }

        body {
            font-family: var(--font-sans);
            background: #f9fafb;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--spacing-lg);
            overflow-x: hidden;
        }

        .container {
            position: relative;
            z-index: 1;
            background: #ffffff;
            border-radius: var(--radius-xl);
            padding: var(--spacing-2xl);
            max-width: 500px;
            width: 100%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid #e5e7eb;
            animation: slideUp 0.5s var(--transition);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: var(--spacing-md);
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: var(--spacing-2xl);
            font-size: 14px;
            line-height: 1.6;
        }

        .categories {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }

        .category-btn {
            padding: var(--spacing-xl);
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--panel);
            cursor: pointer;
            transition: all var(--transition);
            text-align: center;
            font-weight: 600;
            color: var(--text);
            font-size: 14px;
            position: relative;
            overflow: hidden;
        }

        .category-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left var(--transition-slow);
        }

        .category-btn:hover {
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .category-btn:hover::before {
            left: 100%;
        }

        .category-btn.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border-color: var(--primary);
            box-shadow: var(--shadow-lg),
                        0 0 20px rgba(102, 126, 234, 0.3);
        }

        .continue-btn {
            width: 100%;
            padding: var(--spacing-md) var(--spacing-lg);
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            margin-top: var(--spacing-xl);
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            letter-spacing: 0.3px;
        }

        .continue-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .continue-btn:active::before {
            width: 300px;
            height: 300px;
        }

        .continue-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .continue-btn:disabled {
            background: rgba(107, 114, 128, 0.3);
            cursor: not-allowed;
            opacity: 0.5;
        }

        .loading {
            text-align: center;
            color: var(--text-secondary);
            padding: var(--spacing-2xl) var(--spacing-lg);
            font-size: 14px;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary);
            margin-left: var(--spacing-md);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: var(--spacing-xl);
            }

            h1 {
                font-size: 24px;
            }

            .categories {
                grid-template-columns: 1fr 1fr;
                gap: var(--spacing-sm);
            }

            .category-btn {
                padding: var(--spacing-lg);
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: var(--spacing-md);
                align-items: flex-start;
                padding-top: var(--spacing-xl);
            }

            .container {
                padding: var(--spacing-lg);
            }

            h1 {
                font-size: 22px;
            }

            .categories {
                grid-template-columns: 1fr;
            }

            .continue-btn {
                padding: var(--spacing-md);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Um welches Thema geht es?</h1>
        <p class="subtitle">Wähle eine Kategorie für deine Nachricht</p>

        <div id="categoriesContainer" class="categories">
            <div class="loading">Lädt Kategorien...</div>
        </div>

        <button id="continueBtn" class="continue-btn" disabled>Weiter</button>
    </div>

    <script>
        const API_BASE = '/api';
        let selectedCategoryId = null;

        async function loadCategories() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const qrId = urlParams.get('qr');

                const res = await fetch(`${API_BASE}/categories`);
                const data = await res.json();

                const container = document.getElementById('categoriesContainer');
                container.innerHTML = '';

                data.categories.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = 'category-btn';
                    btn.textContent = cat.name;
                    btn.onclick = () => selectCategory(btn, cat.id, qrId);
                    container.appendChild(btn);
                });
            } catch (e) {
                console.error('Fehler beim Laden:', e);
            }
        }

        function selectCategory(btn, categoryId, qrId) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedCategoryId = categoryId;
            document.getElementById('continueBtn').disabled = false;
        }

        document.getElementById('continueBtn').addEventListener('click', () => {
            if (selectedCategoryId) {
                const urlParams = new URLSearchParams(window.location.search);
                const qrId = urlParams.get('qr');
                window.location.href = `/qr/${qrId}?category=${selectedCategoryId}`;
            }
        });

        loadCategories();
    </script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((reg) => console.log('[SW] Registriert'))
                    .catch((err) => console.warn('[SW] Fehler:', err));
            });
        }
    </script>
</body>
</html>
