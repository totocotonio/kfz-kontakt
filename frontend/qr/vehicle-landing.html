<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fahrzeug Kontakt</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 40px 20px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .vehicle-section {
            margin-bottom: 30px;
        }

        .vehicle-image-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            margin-bottom: 15px;
            border-radius: 12px;
            overflow: hidden;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vehicle-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .vehicle-image.loading {
            background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        .license-plate {
            text-align: center;
            font-weight: 700;
            font-size: 18px;
            color: #333;
            background: #fff9e6;
            border: 2px solid #ffd700;
            border-radius: 4px;
            padding: 8px 12px;
            letter-spacing: 2px;
            font-family: 'Courier New', monospace;
            margin-bottom: 10px;
        }

        .license-plate.empty {
            background: #f0f0f0;
            border-color: #ddd;
            color: #999;
            font-style: italic;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
            line-height: 1.5;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }

        .btn {
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
            border-color: #999;
        }

        .error-message {
            text-align: center;
            color: #e74c3c;
            padding: 15px;
            background: #fadbd8;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .info {
            text-align: center;
            color: #7f8c8d;
            font-size: 12px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 Fahrzeug Kontakt</h1>

        <div class="vehicle-section">
            <div class="vehicle-image-wrapper">
                <img id="vehicleImage" class="vehicle-image loading" src="" alt="Fahrzeugbild">
            </div>

            <div id="licensePlateContainer">
                <div class="license-plate empty">Kennzeichen nicht vorhanden</div>
            </div>
        </div>

        <p class="subtitle">
            Möchtest du den Besitzer dieses Fahrzeugs kontaktieren? Hinterlasse eine Nachricht!
        </p>

        <div id="errorContainer"></div>

        <div class="action-buttons">
            <button class="btn btn-primary" id="messageBtn">💬 Nachricht senden</button>
            <button class="btn btn-secondary" id="backBtn">← Zurück</button>
        </div>

        <p class="info">Deine Kontaktdaten werden direkt zum Fahrzeughalter weitergeleitet.</p>
    </div>

    <script>
        // Diese Werte werden von main.py injiziert
        const uniqueId = '';
        const licensePlate = '';
        const vehicleImagePath = '';

        function initPage() {
            console.log('[Debug] uniqueId:', uniqueId);
            console.log('[Debug] licensePlate:', licensePlate);
            console.log('[Debug] vehicleImagePath:', vehicleImagePath);

            if (!uniqueId) {
                showError('Fehler: QR-Code nicht gefunden');
                return;
            }

            // Zeige Kennzeichen an
            if (licensePlate && licensePlate.trim()) {
                const container = document.getElementById('licensePlateContainer');
                container.innerHTML = `<div class="license-plate">${escapeHtml(licensePlate)}</div>`;
            }

            // Lade Fahrzeugbild
            if (vehicleImagePath && vehicleImagePath.trim()) {
                const img = document.getElementById('vehicleImage');
                img.src = vehicleImagePath;
                console.log('[Image] Lädt von:', vehicleImagePath);
                img.onload = () => {
                    console.log('[Image] ✅ Erfolgreich geladen');
                    img.classList.remove('loading');
                };
                img.onerror = () => {
                    console.error('[Image] ❌ Fehler beim Laden:', vehicleImagePath);
                    showError('Fahrzeugbild konnte nicht geladen werden (404 oder Zugriff verweigert)');
                };
            } else {
                const img = document.getElementById('vehicleImage');
                img.classList.remove('loading');
                img.style.background = '#f0f0f0';
                img.style.display = 'none';
                console.warn('[Image] ⚠️ Kein Bildpfad vorhanden');
                showError('Kein Fahrzeugbild verfügbar');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showError(message) {
            const container = document.getElementById('errorContainer');
            container.innerHTML = `<div class="error-message">${escapeHtml(message)}</div>`;
        }

        // Button Event Listeners
        document.getElementById('messageBtn').addEventListener('click', () => {
            if (uniqueId) {
                // Redirect zur Kategorie-Auswahl
                window.location.href = `/select-category.html?qr=${encodeURIComponent(uniqueId)}`;
            } else {
                showError('Fehler: QR-Code nicht verfügbar');
            }
        });

        document.getElementById('backBtn').addEventListener('click', () => {
            window.history.back();
        });

        // Initialisiere Seite beim Laden
        initPage();
    </script>
</body>
</html>
