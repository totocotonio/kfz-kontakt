    <title>Fahrzeug Kontakt</title>
    <style>
        /* © 2026 Torsten Michaely - KFZ Kontakt QR Landing CSS */
        /* Premium Modern Redesign */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap');

        /* ====== DESIGN SYSTEM ====== */
        :root {
            /* Colors */
            --bg: #0f1419;
            --bg-secondary: #1a1f2e;
            --panel: #16192b;
            --panel-hover: #1e2441;
            --border: #2a3550;
            --primary: #667eea;
            --primary-dark: #5568d3;
            --primary-light: #8b9eff;
            --secondary: #764ba2;
            --accent: #667eea;
            --success: #10b981;
            --success-light: #34d399;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --text: #e5e7eb;
            --text-secondary: #9ca3af;
            --muted: #6b7280;

            /* Typography */
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-display: 'Poppins', sans-serif;

            /* Spacing (8px grid) */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 24px;
            --spacing-2xl: 32px;
            --spacing-3xl: 48px;

            /* Shadows */
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.2);
            --shadow-xl: 0 20px 25px rgba(0, 0, 0, 0.3);
            --shadow-focus: 0 0 0 3px rgba(102, 126, 234, 0.1);

            /* Radius */
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 18px;

            /* Transitions */
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition: 300ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 500ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Light mode support */
        html.light {
            --bg: #ffffff;
            --bg-secondary: #f9fafb;
            --panel: #f3f4f6;
            --panel-hover: #e5e7eb;
            --border: #d1d5db;
            --text: #1f2937;
            --text-secondary: #4b5563;
            --muted: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            color-scheme: dark;
        }

        html.light, html.light body {
            color-scheme: light;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-lg);
            overflow-x: hidden;
        }

        /* Animated background gradient effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(118, 75, 162, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            background: rgba(22, 25, 43, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(42, 53, 80, 0.5);
            border-radius: var(--radius-xl);
            padding: var(--spacing-2xl);
            max-width: 500px;
            width: 100%;
            box-shadow: var(--shadow-xl),
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            animation: slideUp 0.5s var(--transition);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: var(--spacing-xl);
            letter-spacing: -0.5px;
        }

        .vehicle-section {
            margin-bottom: var(--spacing-2xl);
        }

        .vehicle-image-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            margin-bottom: var(--spacing-lg);
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: rgba(42, 53, 80, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
        }

        .vehicle-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .vehicle-image.loading {
            background: linear-gradient(90deg,
                rgba(102, 126, 234, 0.1) 25%,
                rgba(102, 126, 234, 0.2) 50%,
                rgba(102, 126, 234, 0.1) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        .license-plate {
            text-align: center;
            font-weight: 700;
            font-size: 16px;
            color: #1a1a1a;
            background: linear-gradient(135deg, #fff9e6 0%, #ffe6cc 100%);
            border: 2px solid #ffd700;
            border-radius: var(--radius-sm);
            padding: var(--spacing-md) var(--spacing-lg);
            letter-spacing: 2px;
            font-family: 'Courier New', 'JetBrains Mono', monospace;
            margin-bottom: var(--spacing-md);
            box-shadow: var(--shadow-md);
        }

        .license-plate.empty {
            background: rgba(42, 53, 80, 0.5);
            border-color: var(--border);
            color: var(--text-secondary);
            font-style: italic;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: var(--spacing-2xl);
            font-size: 14px;
            line-height: 1.6;
        }

        .action-buttons {
            display: flex;
            gap: var(--spacing-md);
            flex-direction: column;
        }

        .btn {
            padding: var(--spacing-md) var(--spacing-lg);
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            text-decoration: none;
            display: block;
            text-align: center;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.3px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: rgba(42, 53, 80, 0.5);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(42, 53, 80, 0.7);
            border-color: var(--primary);
            color: var(--primary-light);
        }

        .error-message {
            text-align: center;
            color: var(--danger);
            padding: var(--spacing-lg);
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-xl);
            animation: slideUp 0.3s var(--transition);
        }

        .info {
            text-align: center;
            color: var(--text-secondary);
            font-size: 12px;
            margin-top: var(--spacing-lg);
            line-height: 1.5;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: var(--spacing-xl);
            }

            h1 {
                font-size: 24px;
            }

            .vehicle-image-wrapper {
                border-radius: var(--radius-md);
            }
        }

        @media (max-width: 480px) {
            body {
                padding: var(--spacing-md);
                align-items: flex-start;
                padding-top: var(--spacing-xl);
            }

            .container {
                padding: var(--spacing-lg);
            }

            h1 {
                font-size: 22px;
            }

            .btn {
                padding: var(--spacing-md) var(--spacing-md);
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 Fahrzeug Kontakt</h1>

        <div class="vehicle-section">
            <div class="vehicle-image-wrapper">
                <img id="vehicleImage" class="vehicle-image loading" src="" alt="Fahrzeugbild">
            </div>

            <div id="licensePlateContainer">
                <div class="license-plate empty">Kennzeichen nicht vorhanden</div>
            </div>
        </div>

        <p class="subtitle">
            Möchtest du den Besitzer dieses Fahrzeugs kontaktieren? Hinterlasse eine Nachricht!
        </p>

        <div id="errorContainer"></div>

        <div class="action-buttons">
            <button class="btn btn-primary" id="messageBtn">💬 Nachricht senden</button>
            <button class="btn btn-secondary" id="backBtn">← Zurück</button>
        </div>

        <p class="info">Deine Kontaktdaten werden direkt zum Fahrzeughalter weitergeleitet.</p>
    </div>

    <script>
        // Diese Werte werden von main.py injiziert
        const uniqueId = '';
        const licensePlate = '';
        const vehicleImagePath = '';

        function initPage() {
            console.log('[Debug] uniqueId:', uniqueId);
            console.log('[Debug] licensePlate:', licensePlate);
            console.log('[Debug] vehicleImagePath:', vehicleImagePath);

            if (!uniqueId) {
                showError('Fehler: QR-Code nicht gefunden');
                return;
            }

            // Zeige Kennzeichen an
            if (licensePlate && licensePlate.trim()) {
                const container = document.getElementById('licensePlateContainer');
                container.innerHTML = `<div class="license-plate">${escapeHtml(licensePlate)}</div>`;
            }

            // Lade Fahrzeugbild
            if (vehicleImagePath && vehicleImagePath.trim()) {
                const img = document.getElementById('vehicleImage');
                img.src = vehicleImagePath;
                console.log('[Image] Lädt von:', vehicleImagePath);
                img.onload = () => {
                    console.log('[Image] ✅ Erfolgreich geladen');
                    img.classList.remove('loading');
                };
                img.onerror = () => {
                    console.error('[Image] ❌ Fehler beim Laden:', vehicleImagePath);
                    showError('Fahrzeugbild konnte nicht geladen werden (404 oder Zugriff verweigert)');
                };
            } else {
                const img = document.getElementById('vehicleImage');
                img.classList.remove('loading');
                img.style.background = '#f0f0f0';
                img.style.display = 'none';
                console.warn('[Image] ⚠️ Kein Bildpfad vorhanden');
                showError('Kein Fahrzeugbild verfügbar');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showError(message) {
            const container = document.getElementById('errorContainer');
            container.innerHTML = `<div class="error-message">${escapeHtml(message)}</div>`;
        }

        // Button Event Listeners
        document.getElementById('messageBtn').addEventListener('click', () => {
            if (uniqueId) {
                // Redirect zur Kategorie-Auswahl
                window.location.href = `/select-category.html?qr=${encodeURIComponent(uniqueId)}`;
            } else {
                showError('Fehler: QR-Code nicht verfügbar');
            }
        });

        document.getElementById('backBtn').addEventListener('click', () => {
            window.history.back();
        });

        // Initialisiere Seite beim Laden
        initPage();
    </script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((reg) => console.log('[SW] Registriert'))
                    .catch((err) => console.warn('[SW] Fehler:', err));
            });
        }
    </script>
</body>
