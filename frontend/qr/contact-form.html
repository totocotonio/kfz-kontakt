<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="copyright" content="© 2026 Torsten Michaely – Alle Rechte vorbehalten. Mit WhatsApp-Integration für flexible Kontaktmöglichkeiten.">

    <meta name="application-name" content="KFZ Kontakt">
    <meta name="description" content="Sichere Nachricht für Fahrzeughalter via QR-Code. Mit WhatsApp und Telegram Integration.">
    <meta name="keywords" content="QR-Code, Fahrzeug, Kontakt, WhatsApp, Nachricht, Auto">

    <meta property="og:type" content="website">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/favicon.png">
    <link rel="manifest" href="../manifest.json">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "KFZ Kontakt",
      "url": "https://kfz-kontakt.michaely.de",
      "description": "Sichere QR-Code Kommunikation zwischen Fahrzeughaltern",
      "author": {"@type": "Person", "name": "Torsten Michaely"},
      "version": "1.0.124",

      "copyrightHolder": {"@type": "Person", "name": "Torsten Michaely"},

    <title>Fahrzeug Kontakt</title>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --whatsapp: #25D366;
            --danger: #e74c3c;
            --success: #27ae60;
            --text: #333;
            --muted: #666;
            --border: #ddd;
            --bg: #f5f5f5;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-sans);
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            font-family: inherit;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #5568d3;
        }
        .error {
            color: #e74c3c;
            margin-top: 10px;
        }
        .success {
            color: #27ae60;
            margin-top: 10px;
        }
        .loading {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 Fahrzeug Kontakt</h1>
        <p class="subtitle">Hinterlasse eine Nachricht für den Fahrzeughalter</p>

        <form id="contactForm">
            <div class="form-group">
                <label for="name">Dein Name (optional)</label>
                <input type="text" id="name" name="name" placeholder="z.B. Max Mustermann">
            </div>

            <div class="form-group">
                <label for="contact">Deine Kontakt (optional)</label>
                <input type="text" id="contact" name="contact" placeholder="Tel oder WhatsApp: +49...">
            </div>

            <div class="form-group">
                <label for="category">Kategorie (optional)</label>
                <select id="category" name="category">
                    <option value="">-- Wähle eine Kategorie --</option>
                    <option value="1">🅿️ Parkplatz</option>
                    <option value="2">💡 Beleuchtung</option>
                    <option value="3">🪟 Fenster</option>
                    <option value="4">⚠️ Schaden</option>
                    <option value="5">📝 Sonstiges</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">Deine Nachricht *</label>
                <textarea id="message" name="message" placeholder="Beschreibe dein Anliegen..." required></textarea>
            </div>

            <button type="submit">Nachricht senden</button>
            <div class="loading" id="loading">Wird gesendet...</div>
            <div id="feedback"></div>
        </form>
    </div>

    <script>
        // Diese Werte werden von main.py injiziert
        const uniqueId = '';
        const selectedCategory = '';

        console.log(`[Debug] uniqueId: "${uniqueId}", selectedCategory: "${selectedCategory}"`);

        function loadCategories() {
            const select = document.getElementById('category');

            // Vorauswahl wenn category parameter gesetzt
            if (selectedCategory && selectedCategory !== '') {
                const catId = String(selectedCategory);
                select.value = catId;
                console.log(`[Category] Pre-selected: ${catId}`);
            }
        }

        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const feedback = document.getElementById('feedback');
            const loading = document.getElementById('loading');

            const payload = {
                sender_name: document.getElementById('name').value || 'Anonym',
                sender_contact: document.getElementById('contact').value,
                category_id: document.getElementById('category').value ? parseInt(document.getElementById('category').value) : null,
                message: document.getElementById('message').value
            };

            loading.style.display = 'block';
            feedback.innerHTML = '';

            try {
                const res = await fetch('/api/qr/' + uniqueId + '/message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    const data = await res.json();
                    const messageId = data.message_id;
                    console.log('Nachricht gesendet:', data);
                    console.log('Message ID:', messageId);

                    feedback.innerHTML = '<p class="success">✅ Nachricht erfolgreich gesendet!</p>';

                    document.getElementById('contactForm').reset();
                } else {
                    feedback.innerHTML = '<p class="error">❌ Fehler beim Senden der Nachricht</p>';
                }
            } catch(e) {
                feedback.innerHTML = '<p class="error">❌ Fehler: ' + e.message + '</p>';
            }
            loading.style.display = 'none';
        });

        loadCategories();
    </script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((reg) => console.log('[SW] Registriert'))
                    .catch((err) => console.warn('[SW] Fehler:', err));
            });
        }
    </script>
</body>
</html>
