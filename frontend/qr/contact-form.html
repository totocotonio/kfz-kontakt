<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fahrzeug Kontakt</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            font-family: inherit;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #5568d3;
        }
        .error {
            color: #e74c3c;
            margin-top: 10px;
        }
        .success {
            color: #27ae60;
            margin-top: 10px;
        }
        .loading {
            display: none;
        }
        .whatsapp-button {
            display: block;
            padding: 12px;
            background: #25D366;
            color: white;
            text-align: center;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .whatsapp-button:hover {
            background: #20ba58;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 Fahrzeug Kontakt</h1>
        <p class="subtitle">Hinterlasse eine Nachricht für den Fahrzeughalter</p>

        <form id="contactForm">
            <div class="form-group">
                <label for="name">Dein Name (optional)</label>
                <input type="text" id="name" name="name" placeholder="z.B. Max Mustermann">
            </div>

            <div class="form-group">
                <label for="contact">Deine Kontakt (optional)</label>
                <input type="text" id="contact" name="contact" placeholder="Tel oder WhatsApp: +49...">
            </div>

            <div class="form-group">
                <label for="category">Kategorie (optional)</label>
                <select id="category" name="category">
                    <option value="">-- Wähle eine Kategorie --</option>
                    <option value="1">🅿️ Parkplatz</option>
                    <option value="2">💡 Beleuchtung</option>
                    <option value="3">🪟 Fenster</option>
                    <option value="4">⚠️ Schaden</option>
                    <option value="5">📝 Sonstiges</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">Deine Nachricht *</label>
                <textarea id="message" name="message" placeholder="Beschreibe dein Anliegen..." required></textarea>
            </div>

            <div id="whatsappSection" class="form-group"></div>

            <button type="submit">Nachricht senden</button>
            <div class="loading" id="loading">Wird gesendet...</div>
            <div id="feedback"></div>
        </form>
    </div>

    <script>
        // Diese Werte werden von main.py injiziert
        const uniqueId = '';
        const selectedCategory = '';

        console.log(`[Debug] uniqueId: "${uniqueId}", selectedCategory: "${selectedCategory}"`);

        function loadCategories() {
            const select = document.getElementById('category');

            // Vorauswahl wenn category parameter gesetzt
            if (selectedCategory && selectedCategory !== '') {
                const catId = String(selectedCategory);
                select.value = catId;
                console.log(`[Category] Pre-selected: ${catId}`);
            }
        }

        async function loadWhatsAppButton() {
            try {
                const res = await fetch('/api/whatsapp');
                const data = await res.json();
                console.log('[WhatsApp] Response:', data);
                const section = document.getElementById('whatsappSection');
                console.log('[WhatsApp] Section:', section);

                if (data.whatsapp_number && data.whatsapp_number.trim()) {
                    console.log('[WhatsApp] Nummer gefunden:', data.whatsapp_number);
                    const waNumber = data.whatsapp_number.replace(/[^0-9]/g, '');
                    console.log('[WhatsApp] Nur Zahlen:', waNumber);
                    if (waNumber) {
                        const waUrl = 'https://wa.me/' + waNumber + '?text=Hallo, ich habe dir eine Nachricht über den QR-Code hinterlassen.';
                        const link = document.createElement('a');
                        link.href = waUrl;
                        link.target = '_blank';
                        link.className = 'whatsapp-button';
                        link.textContent = '💬 Oder direkt WhatsApp schreiben';
                        section.appendChild(link);
                        console.log('[WhatsApp] Button hinzugefügt');
                    }
                } else {
                    console.log('[WhatsApp] Keine Nummer gefunden');
                }
            } catch(e) {
                console.error('WhatsApp laden fehlgeschlagen:', e);
            }
        }

        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const feedback = document.getElementById('feedback');
            const loading = document.getElementById('loading');

            const payload = {
                sender_name: document.getElementById('name').value || 'Anonym',
                sender_contact: document.getElementById('contact').value,
                category_id: document.getElementById('category').value ? parseInt(document.getElementById('category').value) : null,
                message: document.getElementById('message').value
            };

            loading.style.display = 'block';
            feedback.innerHTML = '';

            try {
                const res = await fetch('/api/qr/' + uniqueId + '/message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    const categorySelect = document.getElementById('category');
                    const categoryText = categorySelect.options[categorySelect.selectedIndex]?.text || '';
                    const message = payload.message;
                    const summary = (categoryText ? categoryText + ' - ' : '') + message;

                    feedback.innerHTML = '<p class="success">✅ Nachricht erfolgreich gesendet!</p>';

                    // WhatsApp Button nach Nachricht
                    try {
                        const waRes = await fetch('/api/whatsapp');
                        const waData = await waRes.json();
                        if (waData.whatsapp_number && waData.whatsapp_number.trim()) {
                            const waNumber = waData.whatsapp_number.replace(/[^0-9]/g, '');
                            if (waNumber) {
                                const waUrl = 'https://wa.me/' + waNumber + '?text=' + encodeURIComponent('Ich habe dir eine Nachricht über den QR-Code hinterlassen: ' + summary);
                                feedback.innerHTML += '<a href="' + waUrl + '" target="_blank" class="whatsapp-button">💬 Oder direkt WhatsApp schreiben</a>';
                            }
                        }
                    } catch(e) {
                        console.error('WhatsApp nach Nachricht:', e);
                    }

                    document.getElementById('contactForm').reset();
                } else {
                    feedback.innerHTML = '<p class="error">❌ Fehler beim Senden der Nachricht</p>';
                }
            } catch(e) {
                feedback.innerHTML = '<p class="error">❌ Fehler: ' + e.message + '</p>';
            }
            loading.style.display = 'none';
        });

        loadCategories();
        loadWhatsAppButton();
    </script>
</body>
</html>
