<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="copyright" content="© 2026 Torsten Michaely – Alle Rechte vorbehalten. Mit WhatsApp-Integration für flexible Kontaktmöglichkeiten.">
    <meta name="author" content="Torsten Michaely">
    <meta name="application-name" content="KFZ Kontakt">
    <meta name="description" content="Sichere Nachricht für Fahrzeughalter via QR-Code. Mit WhatsApp und Telegram Integration.">
    <meta name="keywords" content="QR-Code, Fahrzeug, Kontakt, WhatsApp, Nachricht, Auto">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#667eea">
    <meta property="og:title" content="KFZ Kontakt – Fahrzeug Kontaktformular">
    <meta property="og:description" content="Hinterlasse eine Nachricht für den Fahrzeughalter">
    <meta property="og:type" content="website">
    <link rel="manifest" href="../manifest.json">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "KFZ Kontakt",
      "url": "https://kfz-kontakt.michaely.de",
      "description": "Sichere QR-Code Kommunikation zwischen Fahrzeughaltern",
      "author": {"@type": "Person", "name": "Torsten Michaely"},
      "version": "1.0.124",
      "copyrightYear": 2026,
      "copyrightHolder": {"@type": "Person", "name": "Torsten Michaely"},
      "applicationCategory": "Utilities"
    }
    </script>
    <title>Fahrzeug Kontakt</title>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --whatsapp: #25D366;
            --danger: #e74c3c;
            --success: #27ae60;
            --text: #333;
            --muted: #666;
            --border: #ddd;
            --bg: #f5f5f5;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-sans);
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            font-family: inherit;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #5568d3;
        }
        .error {
            color: #e74c3c;
            margin-top: 10px;
        }
        .success {
            color: #27ae60;
            margin-top: 10px;
        }
        .loading {
            display: none;
        }
        .whatsapp-button {
            display: block;
            padding: 12px;
            background: #25D366;
            color: white;
            text-align: center;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .whatsapp-button:hover {
            background: #20ba58;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 Fahrzeug Kontakt</h1>
        <p class="subtitle">Hinterlasse eine Nachricht für den Fahrzeughalter</p>

        <form id="contactForm">
            <div class="form-group">
                <label for="name">Dein Name (optional)</label>
                <input type="text" id="name" name="name" placeholder="z.B. Max Mustermann">
            </div>

            <div class="form-group">
                <label for="contact">Deine Kontakt (optional)</label>
                <input type="text" id="contact" name="contact" placeholder="Tel oder WhatsApp: +49...">
            </div>

            <div class="form-group">
                <label for="category">Kategorie (optional)</label>
                <select id="category" name="category">
                    <option value="">-- Wähle eine Kategorie --</option>
                    <option value="1">🅿️ Parkplatz</option>
                    <option value="2">💡 Beleuchtung</option>
                    <option value="3">🪟 Fenster</option>
                    <option value="4">⚠️ Schaden</option>
                    <option value="5">📝 Sonstiges</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">Deine Nachricht *</label>
                <textarea id="message" name="message" placeholder="Beschreibe dein Anliegen..." required></textarea>
            </div>

            <div id="whatsappSection" class="form-group"></div>

            <button type="submit">Nachricht senden</button>
            <div class="loading" id="loading">Wird gesendet...</div>
            <div id="feedback"></div>
        </form>
    </div>

    <script>
        // Diese Werte werden von main.py injiziert
        const uniqueId = '';
        const selectedCategory = '';

        console.log(`[Debug] uniqueId: "${uniqueId}", selectedCategory: "${selectedCategory}"`);

        function loadCategories() {
            const select = document.getElementById('category');

            // Vorauswahl wenn category parameter gesetzt
            if (selectedCategory && selectedCategory !== '') {
                const catId = String(selectedCategory);
                select.value = catId;
                console.log(`[Category] Pre-selected: ${catId}`);
            }
        }

        async function loadWhatsAppButton() {
            try {
                const res = await fetch('/api/whatsapp');
                const data = await res.json();
                console.log('[WhatsApp] Response:', data);
                const section = document.getElementById('whatsappSection');
                console.log('[WhatsApp] Section:', section);

                if (data.whatsapp_number && data.whatsapp_number.trim()) {
                    console.log('[WhatsApp] Nummer gefunden:', data.whatsapp_number);
                    const waNumber = data.whatsapp_number.replace(/[^0-9]/g, '');
                    console.log('[WhatsApp] Nur Zahlen:', waNumber);
                    if (waNumber) {
                        const waUrl = 'https://wa.me/' + waNumber + '?text=Hallo, ich habe dir eine Nachricht über den QR-Code hinterlassen.';
                        const link = document.createElement('a');
                        link.href = waUrl;
                        link.target = '_blank';
                        link.className = 'whatsapp-button';
                        link.textContent = '💬 Oder direkt WhatsApp schreiben';
                        section.appendChild(link);
                        console.log('[WhatsApp] Button hinzugefügt');
                    }
                } else {
                    console.log('[WhatsApp] Keine Nummer gefunden');
                }
            } catch(e) {
                console.error('WhatsApp laden fehlgeschlagen:', e);
            }
        }

        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const feedback = document.getElementById('feedback');
            const loading = document.getElementById('loading');

            const payload = {
                sender_name: document.getElementById('name').value || 'Anonym',
                sender_contact: document.getElementById('contact').value,
                category_id: document.getElementById('category').value ? parseInt(document.getElementById('category').value) : null,
                message: document.getElementById('message').value
            };

            loading.style.display = 'block';
            feedback.innerHTML = '';

            try {
                const res = await fetch('/api/qr/' + uniqueId + '/message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    const data = await res.json();
                    const messageId = data.message_id;

                    feedback.innerHTML = '<p class="success">✅ Nachricht erfolgreich gesendet!</p>';
                    feedback.innerHTML += '<div style="display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; justify-content: center;">';

                    // Telegram Button
                    feedback.innerHTML += '<a href="https://t.me/kfz_kontakt_bot" target="_blank" style="display: flex; align-items: center; gap: 8px; background: #0088cc; color: white; padding: 12px 20px; border-radius: 6px; text-decoration: none; font-weight: 600; transition: background 0.2s;" onmouseover="this.style.background=\'#0077b5\'" onmouseout="this.style.background=\'#0088cc\'">📧 Telegram</a>';

                    // SMS Button container
                    feedback.innerHTML += '<button id="smsBtn" type="button" style="display: flex; align-items: center; gap: 8px; background: #25D366; color: white; padding: 12px 20px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; transition: background 0.2s; disabled: disabled;">📱 SMS wird versendet...</button>';

                    // WhatsApp Button container
                    feedback.innerHTML += '<button id="waBtn" type="button" style="display: flex; align-items: center; gap: 8px; background: #25D366; color: white; padding: 12px 20px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; transition: background 0.2s; disabled: disabled;">💬 WhatsApp wird versendet...</button>';

                    feedback.innerHTML += '</div>';

                    const smsBtn = document.getElementById('smsBtn');
                    const waBtn = document.getElementById('waBtn');

                    // SMS senden
                    try {
                        const smsRes = await fetch('/api/qr/' + uniqueId + '/contact/sms', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message_id: messageId })
                        });

                        if (smsRes.ok) {
                            smsBtn.textContent = '✅ SMS versendet';
                            smsBtn.disabled = false;
                        } else {
                            smsBtn.textContent = '❌ SMS fehlgeschlagen';
                            smsBtn.style.background = '#e74c3c';
                            smsBtn.disabled = false;
                        }
                    } catch(e) {
                        console.error('SMS Fehler:', e);
                        smsBtn.textContent = '❌ SMS Fehler';
                        smsBtn.style.background = '#e74c3c';
                        smsBtn.disabled = false;
                    }

                    // WhatsApp senden
                    try {
                        const waRes = await fetch('/api/qr/' + uniqueId + '/contact/whatsapp', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message_id: messageId })
                        });

                        if (waRes.ok) {
                            waBtn.textContent = '✅ WhatsApp versendet';
                            waBtn.disabled = false;
                        } else {
                            waBtn.textContent = '❌ WhatsApp fehlgeschlagen';
                            waBtn.style.background = '#e74c3c';
                            waBtn.disabled = false;
                        }
                    } catch(e) {
                        console.error('WhatsApp Fehler:', e);
                        waBtn.textContent = '❌ WhatsApp Fehler';
                        waBtn.style.background = '#e74c3c';
                        waBtn.disabled = false;
                    }

                    document.getElementById('contactForm').reset();
                } else {
                    feedback.innerHTML = '<p class="error">❌ Fehler beim Senden der Nachricht</p>';
                }
            } catch(e) {
                feedback.innerHTML = '<p class="error">❌ Fehler: ' + e.message + '</p>';
            }
            loading.style.display = 'none';
        });

        loadCategories();
        loadWhatsAppButton();
    </script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((reg) => console.log('[SW] Registriert'))
                    .catch((err) => console.warn('[SW] Fehler:', err));
            });
        }
    </script>
</body>
</html>
