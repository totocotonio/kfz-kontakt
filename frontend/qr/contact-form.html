<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="copyright" content="© 2026 Torsten Michaely – Alle Rechte vorbehalten. Mit WhatsApp-Integration für flexible Kontaktmöglichkeiten.">
    <meta name="author" content="Torsten Michaely">
    <meta name="application-name" content="KFZ Kontakt">
    <meta name="description" content="Sichere Nachricht für Fahrzeughalter via QR-Code. Mit WhatsApp und Telegram Integration.">
    <meta name="keywords" content="QR-Code, Fahrzeug, Kontakt, WhatsApp, Nachricht, Auto">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#667eea">

    <link rel="manifest" href="../manifest.json">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "KFZ Kontakt",
      "url": "https://kfz-kontakt.michaely.de",
      "description": "Sichere QR-Code Kommunikation zwischen Fahrzeughaltern",
      "author": {"@type": "Person", "name": "Torsten Michaely"},
      "version": "1.0.124",
      "copyrightYear": 2026,
      "copyrightHolder": {"@type": "Person", "name": "Torsten Michaely"},
      "applicationCategory": "Utilities"
    }
    </script>
    <title>Fahrzeug Kontakt</title>
    <style>
        /* © 2026 Torsten Michaely - KFZ Kontakt QR CSS */
        /* Premium Modern Redesign */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap');

        /* ====== DESIGN SYSTEM ====== */
        :root {
            /* Colors - Light Mode für QR-Besucher */
            --bg: #ffffff;
            --bg-secondary: #f9fafb;
            --panel: #f3f4f6;
            --panel-hover: #e5e7eb;
            --border: #d1d5db;
            --primary: #667eea;
            --primary-dark: #5568d3;
            --primary-light: #8b9eff;
            --secondary: #764ba2;
            --accent: #667eea;
            --success: #10b981;
            --success-light: #34d399;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --whatsapp: #25D366;
            --text: #1f2937;
            --text-secondary: #4b5563;
            --muted: #9ca3af;

            /* Typography */
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-display: 'Poppins', sans-serif;

            /* Spacing (8px grid) */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 24px;
            --spacing-2xl: 32px;
            --spacing-3xl: 48px;

            /* Shadows */
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.2);
            --shadow-xl: 0 20px 25px rgba(0, 0, 0, 0.3);
            --shadow-focus: 0 0 0 3px rgba(102, 126, 234, 0.1);

            /* Radius */
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 18px;

            /* Transitions */
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition: 300ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 500ms cubic-bezier(0.4, 0, 0.2, 1);
        }


        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            color-scheme: light;
        }

        body {
            font-family: var(--font-sans);
            background: #f9fafb;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--spacing-lg);
            overflow-x: hidden;
        }

        .container {
            position: relative;
            z-index: 1;
            background: #ffffff;
            border-radius: var(--radius-xl);
            padding: var(--spacing-2xl);
            max-width: 500px;
            width: 100%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid #e5e7eb;
            animation: slideUp 0.5s var(--transition);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: var(--spacing-md);
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-2xl);
            font-size: 14px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: var(--spacing-xl);
        }

        label {
            display: block;
            margin-bottom: var(--spacing-md);
            color: var(--text);
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 0.3px;
        }

        input, textarea, select {
            width: 100%;
            padding: var(--spacing-md) var(--spacing-lg);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: inherit;
            color: var(--text);
            transition: all var(--transition);
        }

        input::placeholder, textarea::placeholder {
            color: var(--text-secondary);
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--panel-hover);
            box-shadow: var(--shadow-focus);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
        }

        button {
            width: 100%;
            padding: var(--spacing-md) var(--spacing-lg);
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            margin-top: var(--spacing-lg);
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            letter-spacing: 0.3px;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:active::before {
            width: 300px;
            height: 300px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .error {
            color: var(--danger);
            margin-top: var(--spacing-md);
            font-size: 14px;
            padding: var(--spacing-md);
            background: rgba(239, 68, 68, 0.1);
            border-left: 3px solid var(--danger);
            border-radius: var(--radius-sm);
            animation: slideUp 0.3s var(--transition);
        }

        .success {
            color: var(--success-light);
            margin-top: var(--spacing-md);
            font-size: 14px;
            padding: var(--spacing-md);
            background: rgba(16, 185, 129, 0.1);
            border-left: 3px solid var(--success);
            border-radius: var(--radius-sm);
            animation: slideUp 0.3s var(--transition);
        }

        .loading {
            display: none;
            text-align: center;
            color: var(--text-secondary);
            margin-top: var(--spacing-lg);
            font-size: 14px;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary);
            margin-left: 6px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: var(--spacing-xl);
            }

            h1 {
                font-size: 24px;
            }

            input, textarea, select {
                padding: var(--spacing-md) var(--spacing-md);
                font-size: 16px; /* Prevents zoom on iOS */
            }
        }

        @media (max-width: 480px) {
            body {
                padding: var(--spacing-md);
                align-items: flex-start;
                padding-top: var(--spacing-xl);
            }

            .container {
                padding: var(--spacing-lg);
            }

            h1 {
                font-size: 22px;
            }

            button {
                padding: var(--spacing-md);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 Fahrzeug Kontakt</h1>
        <p class="subtitle">Hinterlasse eine Nachricht für den Fahrzeughalter</p>

        <form id="contactForm">
            <div class="form-group">
                <label for="name">Dein Name (optional)</label>
                <input type="text" id="name" name="name" placeholder="z.B. Max Mustermann">
            </div>

            <div class="form-group">
                <label for="contact">Deine Kontakt (optional)</label>
                <input type="text" id="contact" name="contact" placeholder="Tel oder WhatsApp: +49...">
            </div>

            <div class="form-group">
                <label for="category">Kategorie (optional)</label>
                <select id="category" name="category">
                    <option value="">-- Wähle eine Kategorie --</option>
                    <option value="1">🅿️ Parkplatz</option>
                    <option value="2">💡 Beleuchtung</option>
                    <option value="3">🪟 Fenster</option>
                    <option value="4">⚠️ Schaden</option>
                    <option value="5">📝 Sonstiges</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">Deine Nachricht *</label>
                <textarea id="message" name="message" placeholder="Beschreibe dein Anliegen..." required></textarea>
            </div>

            <button type="submit">Nachricht senden</button>
            <div class="loading" id="loading">Wird gesendet...</div>
            <div id="feedback"></div>

            <!-- Contact method buttons (shown after successful submission) -->
            <div id="contactMethodsContainer" style="display: none; margin-top: var(--spacing-xl);">
                <p style="text-align: center; color: var(--text-secondary); margin-bottom: var(--spacing-lg); font-size: 14px;">
                    Admin über weitere Kanäle kontaktieren (optional):
                </p>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-lg);">
                    <button type="button" id="smsBtn" style="background: linear-gradient(135deg, #34d399 0%, #10b981 100%); margin-top: 0;">
                        📱 SMS
                    </button>
                    <button type="button" id="whatsappBtn" style="background: linear-gradient(135deg, #25D366 0%, #20BA58 100%); margin-top: 0;">
                        💬 WhatsApp
                    </button>
                </div>
                <div id="contactFeedback"></div>
            </div>
        </form>
    </div>

    <script>
        // Diese Werte werden von main.py injiziert
        const uniqueId = '';
        const selectedCategory = '';
        let currentMessageId = null;

        console.log(`[Debug] uniqueId: "${uniqueId}", selectedCategory: "${selectedCategory}"`);

        function loadCategories() {
            const select = document.getElementById('category');

            // Vorauswahl wenn category parameter gesetzt
            if (selectedCategory && selectedCategory !== '') {
                const catId = String(selectedCategory);
                select.value = catId;
                console.log(`[Category] Pre-selected: ${catId}`);
            }
        }

        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const feedback = document.getElementById('feedback');
            const loading = document.getElementById('loading');
            const contactMethodsContainer = document.getElementById('contactMethodsContainer');

            const payload = {
                sender_name: document.getElementById('name').value || 'Anonym',
                sender_contact: document.getElementById('contact').value,
                category_id: document.getElementById('category').value ? parseInt(document.getElementById('category').value) : null,
                message: document.getElementById('message').value
            };

            loading.style.display = 'block';
            feedback.innerHTML = '';
            contactMethodsContainer.style.display = 'none';

            try {
                const res = await fetch('/api/qr/' + uniqueId + '/message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    const data = await res.json();
                    currentMessageId = data.message_id;
                    console.log('Nachricht gesendet:', data);
                    console.log('Message ID:', currentMessageId);

                    feedback.innerHTML = '<p class="success">✅ Nachricht erfolgreich gesendet!</p>';

                    // Show contact method buttons
                    contactMethodsContainer.style.display = 'block';

                    document.getElementById('contactForm').reset();
                } else {
                    feedback.innerHTML = '<p class="error">❌ Fehler beim Senden der Nachricht</p>';
                }
            } catch(e) {
                feedback.innerHTML = '<p class="error">❌ Fehler: ' + e.message + '</p>';
            }
            loading.style.display = 'none';
        });

        // SMS Button Handler
        document.getElementById('smsBtn').addEventListener('click', async () => {
            if (!currentMessageId) return;

            const btn = document.getElementById('smsBtn');
            const contactFeedback = document.getElementById('contactFeedback');
            const originalText = btn.innerHTML;

            btn.disabled = true;
            btn.innerHTML = '⏳ Wird versendet...';
            contactFeedback.innerHTML = '';

            try {
                const res = await fetch('/api/qr/' + uniqueId + '/contact/sms', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message_id: currentMessageId })
                });

                if (res.ok) {
                    const data = await res.json();
                    contactFeedback.innerHTML = '<p class="success">✅ SMS wird an Admin versendet!</p>';
                    btn.innerHTML = '✅ SMS versendet';
                } else {
                    const error = await res.json();
                    contactFeedback.innerHTML = '<p class="error">❌ ' + (error.detail || 'SMS konnte nicht versendet werden') + '</p>';
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch(e) {
                contactFeedback.innerHTML = '<p class="error">❌ Fehler: ' + e.message + '</p>';
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // WhatsApp Button Handler
        document.getElementById('whatsappBtn').addEventListener('click', async () => {
            if (!currentMessageId) return;

            const btn = document.getElementById('whatsappBtn');
            const contactFeedback = document.getElementById('contactFeedback');
            const originalText = btn.innerHTML;

            btn.disabled = true;
            btn.innerHTML = '⏳ Wird versendet...';
            contactFeedback.innerHTML = '';

            try {
                const res = await fetch('/api/qr/' + uniqueId + '/contact/whatsapp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message_id: currentMessageId })
                });

                if (res.ok) {
                    const data = await res.json();
                    contactFeedback.innerHTML = '<p class="success">✅ WhatsApp wird an Admin versendet!</p>';
                    btn.innerHTML = '✅ WhatsApp versendet';
                } else {
                    const error = await res.json();
                    contactFeedback.innerHTML = '<p class="error">❌ ' + (error.detail || 'WhatsApp konnte nicht versendet werden') + '</p>';
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch(e) {
                contactFeedback.innerHTML = '<p class="error">❌ Fehler: ' + e.message + '</p>';
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        loadCategories();
    </script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((reg) => console.log('[SW] Registriert'))
                    .catch((err) => console.warn('[SW] Fehler:', err));
            });
        }
    </script>
</body>
</html>
